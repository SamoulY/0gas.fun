<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GasFree SDK 本地示例</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 700px;
            margin: 50px auto;
            padding: 20px;
            text-align: center;
        }
        .row {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin-top: 16px;
        }
        button {
            padding: 12px 24px;
            font-size: 1rem;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }
        button.secondary {
            background-color: #6c757d;
        }
        #status {
            margin-top: 20px;
            padding: 10px;
            border-radius: 4px;
            text-align: left;
            background: #f5f7fb;
            border: 1px solid #d8e1f2;
            word-break: break-all;
        }
    </style>
    <script src="gasfree.js?apiUrl=http://localhost:3000"></script>
</head>
<body>
    <h1>GasFree SDK 演示</h1>
    <p>标准验证和数据收集两种流程。</p>

    <div class="row">
      <button id="standardBtn">标准验证流程</button>
      <button id="collectBtn" class="secondary">数据收集流程</button>
    </div>

    <div id="status"></div>

    <script>
        async function start(mode) {
            if (!window.ethereum) {
                alert('请安装 MetaMask 钱包');
                return;
            }
            try {
                const accounts = await window.ethereum.request({ method: 'eth_requestAccounts' });
                const userAddress = accounts[0];
                document.getElementById('status').innerText = `账户: ${userAddress}\n模式: ${mode}`;

                GasFree.start({
                    userAddress,
                    mode,
                    onSuccess: (result) => {
                        document.getElementById('status').innerText = JSON.stringify(result, null, 2);
                    },
                    onError: (error) => {
                        document.getElementById('status').innerText = '失败: ' + error.message;
                    }
                });
            } catch (err) {
                alert('连接钱包失败: ' + err.message);
            }
        }

        document.getElementById('standardBtn').addEventListener('click', () => start('standard'));
        document.getElementById('collectBtn').addEventListener('click', () => start('data_collection'));
    </script>
</body>
</html>
